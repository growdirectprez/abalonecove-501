<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Document — Abalone Cove</title>
  <style>
    :root {
      --shell-teal: #2a7a7a;
      --shell-sage: #6b8f7a;
      --shell-cream: #f5f0e8;
      --shell-dark: #1a1a2e;
      --shell-warm: #c4a87a;
      --shell-mist: #e8ede9;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 17px; line-height: 1.7; color: var(--shell-dark);
      background: var(--shell-cream); -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .site-header {
      position: sticky; top: 0; background: var(--shell-cream);
      border-bottom: 1px solid var(--shell-warm); z-index: 900; padding: 0 1.5rem;
    }
    .header-inner {
      max-width: 960px; margin: 0 auto; display: flex;
      align-items: center; justify-content: space-between; height: 56px;
    }
    .wordmark {
      font-size: 1.25rem; font-weight: normal; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--shell-dark); text-decoration: none;
    }
    .nav-links { list-style: none; display: flex; gap: 1.75rem; }
    .nav-links a {
      font-size: 0.85rem; letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--shell-dark); text-decoration: none; opacity: 0.7; transition: opacity 0.2s;
    }
    .nav-links a:hover { opacity: 1; }
    .nav-toggle { display: none; }
    .nav-toggle-label { display: none; cursor: pointer; }
    .nav-toggle-label span, .nav-toggle-label span::before, .nav-toggle-label span::after {
      display: block; background: var(--shell-dark); height: 2px; width: 24px;
      border-radius: 2px; position: relative; transition: transform 0.3s, opacity 0.2s;
    }
    .nav-toggle-label span::before, .nav-toggle-label span::after { content: ""; position: absolute; }
    .nav-toggle-label span::before { top: -7px; }
    .nav-toggle-label span::after { top: 7px; }
    .nav-toggle:checked + .nav-toggle-label span { background: transparent; }
    .nav-toggle:checked + .nav-toggle-label span::before { top: 0; transform: rotate(45deg); background: var(--shell-dark); }
    .nav-toggle:checked + .nav-toggle-label span::after { top: 0; transform: rotate(-45deg); background: var(--shell-dark); }

    /* ── Breadcrumb ── */
    .breadcrumb {
      max-width: 740px; margin: 1.25rem auto 0; padding: 0 1.5rem;
      font-size: 0.82rem; color: var(--shell-warm);
    }
    .breadcrumb a { color: var(--shell-sage); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }

    /* ── Document Card ── */
    .doc-card {
      max-width: 740px; margin: 1.25rem auto 3rem; padding: 0 1.5rem;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 2.5rem 3rem;
    }

    /* ── Archive Prose (matches Cove app) ── */
    .archive-prose h1 {
      font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.5rem;
      color: #111827; line-height: 1.3;
    }
    .archive-prose h1:first-child { margin-top: 0; }
    .archive-prose h2 {
      font-size: 1.25rem; font-weight: 600; margin-top: 2rem; margin-bottom: 0.5rem;
      color: #1f2937; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.25rem;
    }
    .archive-prose h3 {
      font-size: 1.05rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.25rem; color: #374151;
    }
    .archive-prose h4 {
      font-size: 0.95rem; font-weight: 600; margin-top: 1.25rem; margin-bottom: 0.25rem; color: var(--shell-teal);
    }
    .archive-prose p {
      margin-bottom: 0.75rem; line-height: 1.7; color: #374151; font-size: 0.9375rem;
    }
    .archive-prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .archive-prose ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .archive-prose li { margin-bottom: 0.25rem; color: #374151; font-size: 0.9375rem; line-height: 1.6; }
    .archive-prose a { color: #2563eb; text-decoration: underline; }
    .archive-prose a:hover { color: #1d4ed8; }
    .archive-prose table {
      width: 100%; border-collapse: collapse; margin-bottom: 1rem; font-size: 0.875rem;
    }
    .archive-prose th {
      background: #f9fafb; padding: 0.5rem 0.75rem; text-align: left;
      font-weight: 600; border: 1px solid #e5e7eb;
    }
    .archive-prose td {
      padding: 0.5rem 0.75rem; border: 1px solid #e5e7eb; vertical-align: top;
    }
    .archive-prose tr:nth-child(even) td { background: #f9fafb; }
    .archive-prose blockquote {
      border-left: 3px solid var(--shell-teal); padding: 0.75rem 1rem;
      color: #4b5563; font-style: italic; margin: 1rem 0;
      background: rgba(42,122,122,0.03); border-radius: 0 4px 4px 0;
    }
    .archive-prose code {
      background: #f3f4f6; padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.875em;
      font-family: Menlo, Monaco, monospace;
    }
    .archive-prose pre {
      background: #f3f4f6; padding: 1rem; border-radius: 6px;
      overflow-x: auto; margin-bottom: 1rem;
    }
    .archive-prose hr {
      border: none; border-top: 1px solid #e5e7eb; margin: 1.5rem 0;
    }
    .archive-prose del { color: #9ca3af; }
    .archive-prose strong { color: #111827; }
    .archive-prose em { font-style: italic; }

    /* Page break markers */
    .archive-prose .page-break {
      display: flex; align-items: center; gap: 0.75rem;
      margin: 2rem 0 1.5rem; font-size: 0.75rem; color: var(--shell-warm);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .archive-prose .page-break::before,
    .archive-prose .page-break::after {
      content: ""; flex: 1; border-top: 1px dashed rgba(196,168,122,0.5);
    }

    /* ── Footer ── */
    .site-footer {
      border-top: 1px solid var(--shell-warm); padding: 2.5rem 1.5rem;
      text-align: center; background: var(--shell-mist);
    }
    .footer-inner { max-width: 680px; margin: 0 auto; }
    .footer-org { font-size: 0.9rem; color: var(--shell-dark); margin-bottom: 0.5rem; }
    .footer-cta { font-size: 0.85rem; color: var(--shell-sage); font-style: italic; }

    .loading { text-align: center; padding: 4rem; color: var(--shell-warm); font-style: italic; }

    /* ── Source Bar ── */
    .source-bar {
      display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
      padding: 0.75rem 1rem; margin-bottom: 1.5rem;
      background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px;
      font-size: 0.82rem; color: #6b7280;
    }
    .source-bar a {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.35rem 0.75rem; border-radius: 4px; text-decoration: none;
      font-weight: 600; font-size: 0.8rem; transition: background 0.15s;
    }
    .source-bar .view-btn {
      background: rgba(42,122,122,0.1); color: var(--shell-teal);
    }
    .source-bar .view-btn:hover { background: rgba(42,122,122,0.18); }
    .source-bar .label { color: #9ca3af; }

    @media (max-width: 768px) {
      body { font-size: 15px; }
      .card { padding: 1.5rem 1.25rem; }
      .archive-prose h1 { font-size: 1.3rem; }
      .nav-toggle-label { display: flex; align-items: center; }
      .nav-links {
        display: none; position: absolute; top: 56px; left: 0; right: 0;
        background: var(--shell-cream); border-bottom: 1px solid var(--shell-warm);
        flex-direction: column; padding: 1rem 1.5rem; gap: 0.75rem;
      }
      .nav-toggle:checked ~ .nav-links { display: flex; }
    }
    @media print {
      .site-header, .breadcrumb { display: none; }
      body { background: #fff; font-size: 10pt; }
      .card { box-shadow: none; padding: 0; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="wordmark"><img src="/images/shell-blended-32.png" alt="" width="28" height="28" style="vertical-align: middle; margin-right: 0.4rem;">Abalone Cove</a>
    <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation">
    <label for="nav-toggle" class="nav-toggle-label"><span></span></label>
    <ul class="nav-links">
      <li><a href="/evidence/">Evidence</a></li>
      <li><a href="/map/">Map</a></li>
      <li><a href="/timeline/">Timeline</a></li>
      <li><a href="/gallery/">Gallery</a></li>
      <li><a href="/sign/">Sign</a></li>
      <li><a href="/about/">About</a></li>
    </ul>
  </div>
</header>

<nav class="breadcrumb">
  <a href="/evidence/">Evidence Room</a> &rsaquo; <span id="crumb-category">Document</span>
</nav>

<div class="doc-card">
  <div class="card">
    <div id="source-bar" class="source-bar" style="display:none;"></div>
    <div id="doc-content" class="archive-prose loading">Loading document&hellip;</div>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-inner">
    <p class="footer-org">Abalone Cove Foundation &middot; abalonecove.org</p>
    <p class="footer-cta">Primary source documents from the documentary record</p>
  </div>
</footer>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const docPath = params.get('doc');
  const originalPath = params.get('original');

  if (!docPath) {
    document.getElementById('doc-content').innerHTML = '<p>No document specified. <a href="/evidence/">Return to Evidence Room</a>.</p>';
    document.getElementById('doc-content').classList.remove('loading');
    return;
  }

  // Show source bar if original file is available
  if (originalPath) {
    const ext = originalPath.split('.').pop().toUpperCase();
    const bar = document.getElementById('source-bar');
    bar.innerHTML = '<span class="label">Source document available (' + ext + ')</span>' +
      '<a href="' + originalPath + '" target="_blank" class="view-btn">' +
      '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>' +
      'View Original</a>';
    bar.style.display = 'flex';
  }

  // Category from path
  const pathParts = docPath.split('/');
  const category = pathParts.length > 2 ? pathParts[pathParts.length - 2] : 'documents';
  const labels = {
    'declarations': 'Founding Declarations',
    'shore-club': 'Shore Club Records',
    'litigation': 'Litigation',
    'geological': 'Engineering Surveys',
    'tract-maps': 'Tract Maps',
    'coastal-plan': 'Coastal Regulation'
  };
  document.getElementById('crumb-category').textContent = labels[category] || category;

  fetch(docPath)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(md => {
      // Convert ---PAGE X--- markers to styled dividers
      md = md.replace(/---PAGE\s+(\d+)---\s*\*?\(?([^)\n]*)\)?\*?/g, function(match, num, note) {
        const label = 'Page ' + num + (note ? ' · ' + note.replace(/^\*\(|\)\*$/g, '') : '');
        return '\n<div class="page-break">' + label + '</div>\n';
      });

      // Remove wiki-style links [[...]]
      md = md.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, '$2');
      md = md.replace(/\[\[([^\]]+)\]\]/g, '$1');

      const el = document.getElementById('doc-content');
      el.innerHTML = marked.parse(md);
      el.classList.remove('loading');

      // Set page title from first h1
      const h1 = el.querySelector('h1');
      if (h1) document.title = h1.textContent + ' — Abalone Cove';
    })
    .catch(err => {
      const el = document.getElementById('doc-content');
      el.innerHTML = '<p>Could not load document. <a href="/evidence/">Return to Evidence Room</a>.</p>';
      el.classList.remove('loading');
    });
})();
</script>

</body>
</html>
